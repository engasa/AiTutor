services:
  db:
    image: postgres:16-alpine
    container_name: aitutor_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aitutor
    ports:
      - "54321:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
db_data:
